    <style>
      * {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: #0A0F1D;
        font-family: 'Crimson Pro', serif;
        color: #FEFAF5;
        overflow-x: hidden;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: #0A0F1D;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #64748B;
      }
      
      /* Page load animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      
      .animate-fade-in-up {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }
      
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
      
      .animate-pulse-soft {
        animation: pulse 3s ease-in-out infinite;
      }
      
      /* Staggered delays */
      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.2s; }
      .stagger-3 { animation-delay: 0.3s; }
      .stagger-4 { animation-delay: 0.4s; }
      .stagger-5 { animation-delay: 0.5s; }
      .stagger-6 { animation-delay: 0.6s; }
      
      /* Hover effects */
      .card-hover {
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .card-hover:hover {
        transform: translateY(-6px);
        box-shadow: 0 12px 80px rgba(0, 0, 0, 0.25);
      }
      
      .btn-hover {
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .btn-hover:hover {
        transform: translateY(-2px);
      }
      
      /* Progress bar */
      .progress-fill {
        transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      /* Gradient borders */
      .gradient-border {
        position: relative;
      }
      
      .gradient-border::before {
        content: '';
        position: absolute;
        inset: 0;
        padding: 1px;
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.3) 0%, rgba(245, 158, 11, 0.05) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        border-radius: inherit;
      }
      
      /* Background texture */
      .bg-texture {
        background-image: 
          radial-gradient(circle at 20% 20%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 50%);
      }
    </style>
  </head>

                >
                  <i className="lucide-list"></i>
                </button>
              </div>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
              {mockProjects.map((project, idx) => (
                <ProjectCard key={project.id} project={project} delay={idx + 1} />
              ))}
            </div>
          </div>
        );
      };
      
      const InitiationManagement = () => {
        const applications = [
          { id: 'SQ2026012', name: '智能仓储系统建设', applicant: '周九', department: '物流部', status: 'approved', date: '2026-03-20' },
          { id: 'SQ2026013', name: '安全生产培训设施', applicant: '吴十', department: '安环部', status: 'pending', date: '2026-03-22' },
        ];
        
        const statusColors = {
          approved: 'bg-accent-success/10 text-accent-success',
          pending: 'bg-amber-500/10 text-amber-500',
          rejected: 'bg-accent-danger/10 text-accent-danger',
        };
        
        const statusLabels = {
          approved: '已通过',
          pending: '审批中',
          rejected: '已驳回',
        };
        
        return (
          <div className="p-8">
            <div className="mb-8 animate-fade-in-up">
              <p className="text-ink-500 text-sm font-display mb-2">立项管理</p>
              <h1 className="text-4xl font-display font-bold text-ivory-50">立项申请</h1>
            </div>
            
            <div className="animate-fade-in-up stagger-1 mb-8 flex items-center justify-between">
              <div className="flex items-center gap-2">
                {['all', 'pending', 'approved', 'rejected'].map((s) => (
                  <button
                    key={s}
                    className="px-4 py-2 rounded-lg text-sm font-display transition-colors bg-ink-800/50 text-ink-400 hover:text-ivory-50"
                  >
                    {s === 'all' ? '全部' : 
                     s === 'pending' ? '审批中' : 
                     s === 'approved' ? '已通过' : '已驳回'}
                  </button>
                ))}
              </div>
              <button className="btn-hover px-5 py-2.5 bg-amber-500 hover:bg-amber-600 text-ink-950 rounded-lg font-display font-medium transition-colors">
                <i className="lucide-plus mr-2"></i> 新建申请
              </button>
            </div>
            
            <div className="animate-fade-in-up stagger-2 gradient-border rounded-2xl overflow-hidden bg-ink-900/50">
              <table className="w-full">
                <thead className="bg-ink-800/50">
                  <tr>
                    <th className="text-left px-6 py-4 text-ink-400 text-sm font-display">申请编号</th>
                    <th className="text-left px-6 py-4 text-ink-400 text-sm font-display">项目名称</th>
                    <th className="text-left px-6 py-4 text-ink-400 text-sm font-display">申请人</th>
                    <th className="text-left px-6 py-4 text-ink-400 text-sm font-display">部门</th>
                    <th className="text-left px-6 py-4 text-ink-400 text-sm font-display">状态</th>
                    <th className="text-left px-6 py-4 text-ink-400 text-sm font-display">申请日期</th>
                    <th className="text-right px-6 py-4 text-ink-400 text-sm font-display">操作</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-ink-800">
                  {applications.map((app, idx) => (
                    <tr key={app.id} className="hover:bg-ink-800/30 transition-colors">
                      <td className="px-6 py-4 font-display text-ivory-50">{app.id}</td>
                      <td className="px-6 py-4 font-body text-ivory-50">{app.name}</td>
                      <td className="px-6 py-4 font-body text-ink-400">{app.applicant}</td>
                      <td className="px-6 py-4 font-body text-ink-400">{app.department}</td>
                      <td className="px-6 py-4">
                        <span className={`text-xs font-display font-medium px-2.5 py-1 rounded-full ${statusColors[app.status]}`}>
                          {statusLabels[app.status]}
                        </span>
                      </td>
                      <td className="px-6 py-4 font-body text-ink-400">{app.date}</td>
                      <td className="px-6 py-4 text-right">
                        <button className="text-amber-500 hover:text-amber-400 font-display text-sm mr-4 transition-colors">
                          查看
                        </button>
                        {app.status === 'pending' && (
                          <>
                            <button className="text-accent-success hover:text-accent-success/80 font-display text-sm mr-4 transition-colors">
                              通过
                            </button>
                            <button className="text-accent-danger hover:text-accent-danger/80 font-display text-sm transition-colors">
                              驳回
                            </button>
                          </>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      };
      
      const ProcurementManagement = () => {
        return (
          <div className="p-8">
            <div className="mb-8 animate-fade-in-up">
              <p className="text-ink-500 text-sm font-display mb-2">采购管理</p>
              <h1 className="text-4xl font-display font-bold text-ivory-50">采购中心</h1>
            </div>
            <div className="animate-fade-in-up stagger-1 gradient-border rounded-2xl p-8 bg-ink-900/50 text-center">
              <i className="lucide-package text-6xl text-ink-600 mb-4"></i>
              <h2 className="text-xl font-display font-semibold text-ivory-50 mb-2">采购管理模块</h2>
              <p className="text-ink-400 font-body">即将推出... 包含采购计划、采购执行、供应商管理等功能</p>
            </div>
          </div>
        );
      };
      
      const ContractsManagement = () => {
        return (
          <div className="p-8">
            <div className="mb-8 animate-fade-in-up">
              <p className="text-ink-500 text-sm font-display mb-2">合同管理</p>
              <h1 className="text-4xl font-display font-bold text-ivory-50">合同中心</h1>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {mockContracts.map((contract, idx) => (
                <div key={contract.id} className={`animate-fade-in-up stagger-${idx + 1} card-hover gradient-border rounded-2xl p-6 bg-ink-900/50`}>
                  <div className="flex items-start justify-between mb-4">
                    <div>
                      <p className="text-xs text-ink-500 font-display mb-1">{contract.id}</p>
                      <h3 className="font-display font-semibold text-ivory-50">{contract.name}</h3>
                    </div>
                    <span className="text-xs font-medium px-2.5 py-1 rounded-full bg-accent-success/10 text-accent-success">
                      执行中
                    </span>
                  </div>
                  <div className="text-ink-400 font-body mb-4">
                    <p>金额: <span className="font-display font-semibold text-ivory-50">¥{(contract.amount / 10000).toFixed(0)}万</span></p>
                    <p>相对方: {contract.party}</p>
                    <p>到期日期: {contract.expireDate}</p>
                  </div>
                  <button className="text-amber-500 hover:text-amber-400 font-display font-medium text-sm flex items-center gap-1 transition-colors">
                    查看详情 <i className="lucide-arrow-right"></i>
                  </button>
                </div>
              ))}
            </div>
          </div>
        );
      };
      
      // ==================== MAIN APP ====================
      const App = () => {
        const [currentModule, setCurrentModule] = useState('dashboard');
        
        const renderModule = () => {
          switch (currentModule) {
            case 'dashboard': return <Dashboard />;
            case 'projects': return <ProjectList />;
            case 'initiation': return <InitiationManagement />;
            case 'procurement': return <ProcurementManagement />;
            case 'contracts': return <ContractsManagement />;
            default: return <Dashboard />;
          }
        };
        
        return (
          <div className="flex min-h-screen">
            {/* Sidebar */}
            <aside className="w-72 fixed left-0 top-0 bottom-0 bg-ink-950/80 backdrop-blur-xl border-r border-ink-800 z-10">
              <div className="p-8">
                <div className="animate-fade-in-up flex items-center gap-3 mb-10">
                  <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-500 to-amber-600 flex items-center justify-center shadow-amber-glow">
                    <i className="lucide-wine text-ink-950 text-2xl"></i>
                  </div>
                  <div>
                    <h1 className="font-display font-bold text-ivory-50 text-lg">贵州习酒</h1>
                    <p className="text-ink-500 text-sm font-body">项目一体化平台</p>
                  </div>
                </div>
                
                <nav className="space-y-2">
                  {modules.map((module, idx) => (
                    <NavigationItem
                      key={module.id}
                      module={module}
                      active={currentModule === module.id}
                      onClick={() => setCurrentModule(module.id)}
                      delay={idx + 1}
                    />
                  ))}
                </nav>
              </div>
              
              <div className="absolute bottom-0 left-0 right-0 p-8">
                <div className="animate-fade-in-up stagger-8 gradient-border rounded-xl p-4 bg-ink-900/50">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-full bg-ink-800 flex items-center justify-center">
                      <i className="lucide-user text-ink-400"></i>
                    </div>
                    <div className="flex-1">
                      <p className="font-display font-medium text-ivory-50 text-sm">管理员</p>
                      <p className="text-ink-500 text-xs font-body">数字与信息化中心</p>
                    </div>
                    <button className="text-ink-500 hover:text-ivory-50 transition-colors">
                      <i className="lucide-settings"></i>
                    </button>
                  </div>
                </div>
              </div>
            </aside>
            
            {/* Main Content */}
            <main className="flex-1 ml-72">
              {/* Top Bar */}
              <header className="sticky top-0 z-10 bg-ink-950/60 backdrop-blur-xl border-b border-ink-800">
                <div className="px-8 py-4 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <button className="p-2 rounded-lg bg-ink-800/50 text-ink-400 hover:text-ivory-50 transition-colors">
                      <i className="lucide-search"></i>
                    </button>
                  </div>
                  <div className="flex items-center gap-4">
                    <button className="relative p-2 rounded-lg text-ink-400 hover:text-ivory-50 transition-colors">
                      <i className="lucide-bell text-xl"></i>
                      <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-accent-danger"></span>
                    </button>
                    <div className="h-8 w-px bg-ink-800"></div>
                    <div className="text-ink-400 text-sm font-body">v1.0.0</div>
                  </div>
                </div>
              </header>
              
              {/* Page Content */}
              <div className="min-h-[calc(100vh-73px)]">
                {renderModule()}
              </div>
            </main>
          </div>
        );
      };
      
      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
