<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>项目一体化平台 - 君品绿主题原型设计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-icons@0.263.1/font/lucide.css">
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; background: #F7F8FA; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      :root {
        --junpin-green: #0A5C36;
        --junpin-green-dark: #084C2C;
        --junpin-green-light: #F0F7F4;
        --text-primary: #333333;
        --text-secondary: #666666;
        --text-tertiary: #999999;
        --border-color: #E5E5E5;
        --success: #00B42A;
        --warning: #FF7D00;
        --danger: #F53F3F;
      }
      .text-junpin { color: var(--junpin-green); }
      .bg-junpin { background-color: var(--junpin-green); }
      .bg-junpin-light { background-color: var(--junpin-green-light); }
      .border-junpin { border-color: var(--junpin-green); }
      .btn-junpin { background-color: var(--junpin-green); color: white; transition: all 0.2s ease; }
      .btn-junpin:hover { background-color: var(--junpin-green-dark); transform: scale(0.98); }
      .tab-active { color: var(--junpin-green); border-bottom: 2px solid var(--junpin-green); }
      .card-hover { transition: all 0.3s ease; }
      .card-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12); border-color: var(--junpin-green); }
      .row-hover:hover { background-color: var(--junpin-green-light); }
      .view-switch-btn.active { color: var(--junpin-green); border-bottom: 2px solid var(--junpin-green); }
      .page-transition { animation: fadeIn 0.3s ease; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    
    <script>
      const mockProjects = [
        { id: 'PJ2026001', name: '包装车间智能化升级', type: 'equipment', manager: '张明远', department: '生产部', progress: 82, budget: 12800000, budgetUsed: 10500000, status: 'normal', health: { score: 88, label: '正常' }, daysLeft: 15 },
        { id: 'PJ2026002', name: '质量管控AI平台', type: 'research', manager: '李思源', department: '技术中心', progress: 45, budget: 5200000, budgetUsed: 4800000, status: 'warning', health: { score: 62, label: '预警' }, daysLeft: -2 },
        { id: 'PJ2026003', name: '营销数字化中台', type: 'it', manager: '王静怡', department: '信息中心', progress: 68, budget: 8500000, budgetUsed: 5800000, status: 'normal', health: { score: 92, label: '正常' }, daysLeft: 30 },
        { id: 'PJ2026004', name: '基酒储存设施扩建', type: 'investment', manager: '陈建国', department: '基建部', progress: 28, budget: 35000000, budgetUsed: 12000000, status: 'danger', health: { score: 48, label: '逾期' }, daysLeft: -8 },
      ];
      
      const App = () => {
        const [currentPage, setCurrentPage] = React.useState('home');
        const [viewMode, setViewMode] = React.useState('card');
        const [selectedProject, setSelectedProject] = React.useState(null);
        
        const renderHomePage = () => (
          <div className="page-transition">
            <div className="max-w-7xl mx-auto px-5 py-8">
              <div className="mb-8">
                <h1 className="text-2xl font-bold text-[#333333] mb-2">君品绿·项目一体化平台</h1>
                <p className="text-[#666666]">贵州习酒 · 项目管理数字化</p>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
                {[
                  { title: '项目总数', value: '128', trend: '+12', trendUp: true },
                  { title: '进行中', value: '45', trend: '+5', trendUp: true },
                  { title: '已逾期', value: '8', trend: '+3', trendUp: false, isWarning: true },
                  { title: '风险项目', value: '12', trend: '+2', trendUp: false, isWarning: true },
                ].map((stat, idx) => (
                  <div key={idx} className="card-hover bg-white rounded-lg border border-[#E5E5E5] p-5 shadow-sm">
                    <p className="text-[#666666] text-sm mb-2">{stat.title}</p>
                    <div className="flex items-baseline justify-between">
                      <p className="text-3xl font-bold text-[#333333]">{stat.value}</p>
                      <span className={`text-sm font-medium flex items-center gap-1 ${stat.isWarning ? (stat.trendUp ? 'text-[#F53F3F]' : 'text-[#00B42A]') : (stat.trendUp ? 'text-junpin' : 'text-[#F53F3F]')}`}>
                        <i className={`lucide-${stat.trendUp ? 'trending-up' : 'trending-down'}`}></i>
                        {stat.trend}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
              
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2">
                  <div className="bg-white rounded-lg border border-[#E5E5E5] p-5 shadow-sm">
                    <div className="flex items-center justify-between mb-5">
                      <h2 className="text-lg font-semibold text-[#333333]">项目健康度 TOP 5</h2>
                      <button onClick={() => setCurrentPage('projects')} className="text-junpin hover:underline text-sm font-medium">
                        查看全部 <i className="lucide-arrow-right ml-1"></i>
                      </button>
                    </div>
                    <div className="space-y-4">
                      {mockProjects.slice(0, 5).map((project, idx) => (
                        <div key={project.id} className="flex items-center justify-between p-3 rounded-lg hover:bg-[#F0F7F4] cursor-pointer transition-colors" onClick={() => { setSelectedProject(project); setCurrentPage('detail'); }}>
                          <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-lg bg-[#F0F7F4] flex items-center justify-center">
                              <i className="lucide-building text-junpin"></i>
                            </div>
                            <div>
                              <p className="font-medium text-[#333333]">{project.name}</p>
                              <p className="text-sm text-[#666666]">{project.id} · {project.department}</p>
                            </div>
                          </div>
                          <div className="flex items-center gap-4">
                            <div className="text-right">
                              <p className="text-sm font-medium text-[#333333]">{project.progress}%</p>
                              <div className="w-24 h-1.5 bg-[#E5E5E5] rounded-full overflow-hidden mt-1">
                                <div className="h-full bg-junpin rounded-full" style={{ width: `${project.progress}%` }}></div>
                              </div>
                            </div>
                            <span className={`text-xs font-medium px-2 py-1 rounded-full ${
                              project.status === 'normal' ? 'bg-[#E8F7F0] text-[#00B42A]' :
                              project.status === 'warning' ? 'bg-[#FFF7E8] text-[#FF7D00]' :
                              'bg-[#FDECEC] text-[#F53F3F]'
                            }`}>{project.health.label}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                
                <div>
                  <div className="bg-white rounded-lg border border-[#E5E5E5] p-5 shadow-sm">
                    <div className="flex items-center justify-between mb-5">
                      <h2 className="text-lg font-semibold text-[#333333]">预警消息</h2>
                    </div>
                    <div className="space-y-3">
                      {[
                        { title: '基酒储存设施 - 进度逾期', level: 'danger', time: '8天前' },
                        { title: '质量管控平台 - 预算超支', level: 'warning', time: '2天前' },
                        { title: '包装车间升级 - 合同即将到期', level: 'warning', time: '3天后' },
                      ].map((warning, idx) => (
                        <div key={idx} className={`p-3 rounded-lg border-l-2 ${
                          warning.level === 'danger' ? 'bg-[#FDECEC] border-l-[#F53F3F]' : 'bg-[#FFF7E8] border-l-[#FF7D00]'
                        }`}>
                          <p className={`font-medium text-sm ${warning.level === 'danger' ? 'text-[#F53F3F]' : 'text-[#FF7D00]'}`}>{warning.title}</p>
                          <p className="text-xs text-[#666666] mt-1">{warning.time}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
        
        const renderProjectsPage = () => (
          <div className="page-transition">
            <div className="max-w-7xl mx-auto px-5 py-8">
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h1 className="text-2xl font-bold text-[#333333] mb-2">项目总览</h1>
                  <p className="text-[#666666]">共 {mockProjects.length} 个项目</p>
                </div>
                <div className="flex items-center gap-4">
                  <div className="flex bg-white rounded-lg border border-[#E5E5E5] p-1">
                    <button
                      onClick={() => setViewMode('list')}
                      className={`view-switch-btn px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-all ${viewMode === 'list' ? 'active' : 'text-[#666666]'}`}
                    >
                      <i className="lucide-list"></i>
                      列表
                    </button>
                    <button
                      onClick={() => setViewMode('card')}
                      className={`view-switch-btn px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-all ${viewMode === 'card' ? 'active' : 'text-[#666666]'}`}
                    >
                      <i className="lucide-grid-3x3"></i>
                      卡片
                    </button>
                  </div>
                  <button className="btn-junpin px-4 py-2 rounded-md flex items-center gap-2 font-medium">
                    <i className="lucide-plus"></i>
                    新建项目
                  </button>
                </div>
              </div>
              
              <div className="bg-white rounded-lg border border-[#E5E5E5] p-4 shadow-sm mb-6">
                <div className="flex flex-wrap items-center gap-3">
                  <select className="px-3 py-2 rounded-md border border-[#E5E5E5] text-sm text-[#333333] focus:outline-none focus:border-junpin">
                    <option>全部类型</option><option>投资类</option><option>设备类</option><option>科研类</option><option>信息化类</option>
                  </select>
                  <select className="px-3 py-2 rounded-md border border-[#E5E5E5] text-sm text-[#333333] focus:outline-none focus:border-junpin">
                    <option>全部状态</option><option>正常</option><option>预警</option><option>逾期</option>
                  </select>
                  <select className="px-3 py-2 rounded-md border border-[#E5E5E5] text-sm text-[#333333] focus:outline-none focus:border-junpin">
                    <option>全部部门</option><option>生产部</option><option>技术中心</option><option>信息中心</option>
                  </select>
                  <div className="flex-1"></div>
                  {['全部', '进行中', '已逾期', '本月到期'].map((tag, idx) => (
                    <button key={idx} className={`px-3 py-1 rounded-full text-sm ${idx === 0 ? 'bg-junpin text-white' : 'bg-[#F0F0F0] text-[#666666] hover:bg-[#E5E5E5]'}`}>
                      {tag}
                    </button>
                  ))}
                </div>
              </div>
              
              {viewMode === 'card' ? (
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                  {mockProjects.map((project, idx) => (
                    <div key={project.id} className="card-hover bg-white rounded-lg border border-[#E5E5E5] overflow-hidden shadow-sm cursor-pointer" onClick={() => { setSelectedProject(project); setCurrentPage('detail'); }}>
                      <div className="p-5">
                        <div className="flex items-start justify-between mb-4">
                          <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-lg bg-[#F0F7F4] flex items-center justify-center">
                              <i className="lucide-building text-junpin"></i>
                            </div>
                            <div>
                              <h3 className="font-semibold text-[#333333]">{project.name}</h3>
                              <p className="text-sm text-[#666666]">{project.id}</p>
                            </div>
                          </div>
                          <span className={`text-xs font-medium px-2 py-1 rounded-full ${
                            project.status === 'normal' ? 'bg-[#E8F7F0] text-[#00B42A]' :
                            project.status === 'warning' ? 'bg-[#FFF7E8] text-[#FF7D00]' :
                            'bg-[#FDECEC] text-[#F53F3F]'
                          }`}>{project.health.label}</span>
                        </div>
                        
                        <div className="flex items-center gap-4 text-sm text-[#666666] mb-4">
                          <span className="flex items-center gap-1.5"><i className="lucide-user"></i> {project.manager}</span>
                          <span className="flex items-center gap-1.5"><i className="lucide-building-2"></i> {project.department}</span>
                        </div>
                        
                        <div className="mb-4">
                          <div className="flex items-center justify-between text-sm mb-2">
                            <span className="text-[#666666]">进度</span>
                            <span className="font-medium text-[#333333]">{project.progress}%</span>
                          </div>
                          <div className="w-full h-2 bg-[#E5E5E5] rounded-full overflow-hidden">
                            <div className="h-full bg-junpin rounded-full" style={{ width: `${project.progress}%` }}></div>
                          </div>
                        </div>
                        
                        <div className="text-sm mb-4">
                          <span className="text-[#666666]">预算: </span>
                          <span className="font-medium text-[#333333]">¥{(project.budget / 10000).toFixed(0)}万</span>
                          <span className="text-[#999999] mx-1">/</span>
                          <span className={`font-medium ${(project.budgetUsed / project.budget) > 1 ? 'text-[#F53F3F]' : 'text-[#333333]'}`}>
                            ¥{(project.budgetUsed / 10000).toFixed(0)}万
                          </span>
                        </div>
                        
                        <div className="flex items-center justify-between pt-4 border-t border-[#E5E5E5]">
                          <div className="flex items-center gap-2">
                            {project.status === 'normal' ? <i className="lucide-check-circle text-[#00B42A]"></i> : 
                             project.status === 'warning' ? <i className="lucide-alert-triangle text-[#FF7D00]"></i> : 
                             <i className="lucide-alert-circle text-[#F53F3F]"></i>}
                            <span className={project.daysLeft >= 0 ? 'text-[#666666]' : 'text-[#F53F3F]'}>
                              {project.daysLeft >= 0 ? `📅 剩余 ${project.daysLeft} 天` : `⚠️ 逾期 ${-project.daysLeft} 天`}
                            </span>
                          </div>
                          <button className="text-junpin hover:underline font-medium text-sm flex items-center gap-1">
                            详情 <i className="lucide-arrow-right"></i>
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="bg-white rounded-lg border border-[#E5E5E5] shadow-sm overflow-hidden">
                  <table className="w-full">
                    <thead className="bg-[#F7F8FA]">
                      <tr>
                        <th className="px-5 py-3 text-left text-sm font-semibold text-[#333333]">项目名称</th>
                        <th className="px-5 py-3 text-left text-sm font-semibold text-[#333333]">负责人</th>
                        <th className="px-5 py-3 text-left text-sm font-semibold text-[#333333]">部门</th>
                        <th className="px-5 py-3 text-left text-sm font-semibold text-[#333333]">进度</th>
                        <th className="px-5 py-3 text-left text-sm font-semibold text-[#333333]">预算</th>
                        <th className="px-5 py-3 text-left text-sm font-semibold text-[#333333]">状态</th>
                        <th className="px-5 py-3 text-left text-sm font-semibold text-[#333333]">剩余天数</th>
                        <th className="px-5 py-3 text-right text-sm font-semibold text-[#333333]">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-[#E5E5E5]">
                      {mockProjects.map((project, idx) => (
                        <tr key={project.id} className="row-hover cursor-pointer" onClick={() => { setSelectedProject(project); setCurrentPage('detail'); }}>
                          <td className="px-5 py-4">
                            <div><p className="font-medium text-[#333333]">{project.name}</p><p className="text-sm text-[#666666]">{project.id}</p></div>
                          </td>
                          <td className="px-5 py-4 text-[#333333]">{project.manager}</td>
                          <td className="px-5 py-4 text-[#666666]">{project.department}</td>
                          <td className="px-5 py-4">
                            <div className="flex items-center gap-2">
                              <span className="font-medium text-[#333333]">{project.progress}%</span>
                              <div className="w-20 h-1.5 bg-[#E5E5E5] rounded-full overflow-hidden">
                                <div className="h-full bg-junpin rounded-full" style={{ width: `${project.progress}%` }}></div>
                              </div>
                            </div>
                          </td>
                          <td className="px-5 py-4 text-[#333333]">¥{(project.budget / 10000).toFixed(0)}万</td>
                          <td className="px-5 py-4">
                            <span className={`text-xs font-medium px-2 py-1 rounded-full ${
                              project.status === 'normal' ? 'bg-[#E8F7F0] text-[#00B42A]' :
                              project.status === 'warning' ? 'bg-[#FFF7E8] text-[#FF7D00]' :
                              'bg-[#FDECEC] text-[#F53F3F]'
                            }`}>{project.health.label}</span>
                          </td>
                          <td className="px-5 py-4">
                            <span className={project.daysLeft >= 0 ? 'text-[#666666]' : 'text-[#F53F3F]'}>
                              {project.daysLeft >= 0 ? `${project.daysLeft} 天` : `逾期 ${-project.daysLeft} 天`}
                            </span>
                          </td>
                          <td className="px-5 py-4 text-right">
                            <button className="text-junpin hover:underline text-sm font-medium">详情</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        );
        
        const renderDetailPage = () => {
          if (!selectedProject) return null;
          const [activeTab, setActiveTab] = React.useState('overview');
          
          return (
            <div className="page-transition">
              <div className="bg-white border-b border-[#E5E5E5]">
                <div className="max-w-7xl mx-auto px-5 py-6">
                  <div className="flex items-center gap-4 mb-4">
                    <button onClick={() => setCurrentPage('projects')} className="p-2 rounded-lg hover:bg-[#F0F7F4] transition-colors">
                      <i className="lucide-arrow-left text-[#666666]"></i>
                    </button>
                    <div><p className="text-[#666666] text-sm">项目总览 &gt; {selectedProject.name}</p></div>
                  </div>
                  
                  <div className="flex items-start gap-4">
                    <div className="w-14 h-14 rounded-lg bg-[#F0F7F4] flex items-center justify-center">
                      <i className="lucide-building text-junpin text-2xl"></i>
                    </div>
                    <div className="flex-1">
                      <h1 className="text-2xl font-bold text-[#333333]">{selectedProject.name}</h1>
                      <div className="flex items-center gap-4 mt-2 text-sm text-[#666666]">
                        <span>{selectedProject.id}</span>
                        <span className="flex items-center gap-1.5"><i className="lucide-user"></i> {selectedProject.manager}</span>
                        <span className="flex items-center gap-1.5"><i className="lucide-building-2"></i> {selectedProject.department}</span>
                        <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${
                          selectedProject.status === 'normal' ? 'bg-[#E8F7F0] text-[#00B42A]' :
                          selectedProject.status === 'warning' ? 'bg-[#FFF7E8] text-[#FF7D00]' :
                          'bg-[#FDECEC] text-[#F53F3F]'
                        }`}>{selectedProject.health.label}</span>
                      </div>
                    </div>
                    <button className="btn-junpin px-4 py-2 rounded-md flex items-center gap-2 font-medium">
                      <i className="lucide-edit"></i>
                      编辑
                    </button>
                  </div>
                </div>
              </div>
              
              <div className="max-w-7xl mx-auto px-5 py-6">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-5 mb-8">
                  {[
                    { label: '总预算', value: `¥${(selectedProject.budget / 10000).toFixed(0)}万` },
                    { label: '已发生成本', value: `¥${(selectedProject.budgetUsed / 10000).toFixed(0)}万` },
                    { label: '整体进度', value: `${selectedProject.progress}%` },
                    { label: '项目成员', value: '8人' },
                  ].map((stat, idx) => (
                    <div key={idx} className="bg-white rounded-lg border border-[#E5E5E5] p-5 shadow-sm">
                      <p className="text-[#666666] text-sm mb-1">{stat.label}</p>
                      <p className="text-2xl font-bold text-[#333333]">{stat.value}</p>
                    </div>
                  ))}
                </div>
                
                <div className="bg-white rounded-lg border border-[#E5E5E5] shadow-sm overflow-hidden">
                  <div className="flex border-b border-[#E5E5E5]">
                    {['概览', '立项', '采购', '合同', '进度', '成本', '验收', '档案', '预警'].map((tab, idx) => (
                      <button
                        key={tab}
                        onClick={() => setActiveTab(tab)}
                        className={`px-6 py-4 text-sm font-medium transition-colors ${
                          activeTab === tab ? 'tab-active' : 'text-[#666666] hover:text-[#333333]'
                        }`}
                      >
                        {tab}
                      </button>
                    ))}
                  </div>
                  <div className="p-6">
                    {activeTab === '概览' ? (
                      <div className="text-center py-12 text-[#666666]">
                        <i className="lucide-info text-4xl text-[#999999] mb-4"></i>
                        <p className="text-lg">项目概览内容区域</p>
                        <p className="text-sm mt-2">左侧：项目信息 + 最新动态</p>
                        <p className="text-sm">右侧：快捷操作 + 待办事项</p>
                      </div>
                    ) : (
                      <div className="text-center py-12 text-[#666666]">
                        <i className="lucide-file-locked text-4xl text-[#999999] mb-4"></i>
                        <p className="text-lg">"{activeTab}" 模块内容待后续设计</p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        };
        
        const renderCurrentPage = () => {
          switch (currentPage) {
            case 'home': return renderHomePage();
            case 'projects': return renderProjectsPage();
            case 'detail': return renderDetailPage();
            default: return renderHomePage();
          }
        };
        
        return (
          <div className="min-h-screen">
            <nav className="bg-white border-b border-[#E5E5E5] sticky top-0 z-50">
              <div className="max-w-7xl mx-auto px-5 h-16 flex items-center justify-between">
                <div className="flex items-center gap-8">
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-lg bg-junpin flex items-center justify-center">
                      <i className="lucide-building text-white"></i>
                    </div>
                    <span className="text-lg font-bold text-[#333333]">君品绿·项目一体化平台</span>
                  </div>
                  <div className="flex items-center gap-1">
                    {[
                      { id: 'home', label: '首页', icon: 'home' },
                      { id: 'projects', label: '项目总览', icon: 'building-2' },
                      { id: 'business', label: '业务中心', icon: 'briefcase' },
                      { id: 'data', label: '数据中心', icon: 'bar-chart-3' },
                      { id: 'settings', label: '系统管理', icon: 'settings' },
                    ].map((nav) => (
                      <button
                        key={nav.id}
                        onClick={() => setCurrentPage(nav.id === 'home' ? 'home' : nav.id === 'projects' ? 'projects' : 'home')}
                        className={`px-4 py-2 rounded-md flex items-center gap-2 text-sm font-medium transition-colors ${
                          (nav.id === 'home' && currentPage === 'home') || 
                          (nav.id === 'projects' && currentPage === 'projects') || 
                          (nav.id === 'projects' && currentPage === 'detail')
                            ? 'bg-[#F0F7F4] text-junpin' 
                            : 'text-[#666666] hover:text-[#333333]'
                        }`}
                      >
                        <i className={`lucide-${nav.icon}`}></i>
                        {nav.label}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <button className="relative p-2 rounded-lg text-[#666666] hover:text-[#333333] transition-colors">
                    <i className="lucide-bell text-xl"></i>
                    <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-[#F53F3F]"></span>
                  </button>
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-full bg-[#F0F7F4] flex items-center justify-center">
                      <i className="lucide-user text-[#666666]"></i>
                    </div>
                    <span className="text-sm font-medium text-[#333333]">管理员</span>
                  </div>
                </div>
              </div>
            </nav>
            
            <main>{renderCurrentPage()}</main>
          </div>
        );
      };
      
      ReactDOM.render(<App />, document.getElementById('app'));
    </script>
  </body>
</html>
